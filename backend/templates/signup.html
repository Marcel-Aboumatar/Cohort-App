<!DOCTYPE html>
<html>

<body>

<h1>Sign Up</h1>

<form method="POST" action="/signup">

  <input
    type="text"
    name="username"
    placeholder="Username"
    required
  >

  <br><br>

  <input
    type="password"
    name="password"
    placeholder="Password"
    required
  >

  <br><br>

  <button type="submit">
    Sign Up
  </button>

</form>

</body>
</html>
